# docker-compose.yml — SCA DevOps Bootcamp: Monitoring Lab
#
# This stack runs everything you need for the monitoring classes:
#
#   pay-api           →  The application we are monitoring         (port 5000)
#   node-exporter     →  Exposes system metrics (CPU, memory, …)  (port 9100)
#   prometheus        →  Scrapes and stores metrics                (port 9090)
#   grafana           →  Visualization and dashboards              (port 3000)
#   loki              →  Log aggregation                           (port 3100)
#   alloy             →  Collects container logs, ships to Loki    (port 12345)
#   traffic-generator →  Simulates user traffic against pay-api
#
# Usage:
#   docker compose up -d
#   docker compose down
#
# Access:
#   Prometheus  →  http://<EC2-PUBLIC-IP>:9090
#   Grafana     →  http://<EC2-PUBLIC-IP>:3000   (admin / admin)
#   pay-api     →  http://<EC2-PUBLIC-IP>:5000
#   Node Exp    →  http://<EC2-PUBLIC-IP>:9100/metrics

services:
  # ── The Application ──────────────────────────────────────────
  pay-api:
    build: ./pay-api
    container_name: pay-api
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      retries: 3

  # ── Traffic Generator (simulates users) ──────────────────────
  traffic-generator:
    image: alpine/curl:latest
    container_name: traffic-generator
    entrypoint: ["/bin/sh", "/scripts/generate-traffic.sh"]
    volumes:
      - ./traffic-generator:/scripts:ro
    depends_on:
      - pay-api
    restart: unless-stopped

  # ── Node Exporter (system metrics) ───────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped

  # ── Prometheus (metrics database) ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  # ── Grafana (visualization) ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  # ── Loki (log aggregation) ───────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # ── Alloy (log collector — replaces Promtail) ────────────────
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "12345:12345"
    volumes:
      - ./config/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "/etc/alloy/config.alloy"
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
